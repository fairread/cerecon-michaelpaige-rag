version: '3.8'

services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
      - local_data:/data
    restart: unless-stopped

  frontend:
    build: ../frontend
    ports:
      - "5173:5173"
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ../frontend:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend

  vectordb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    restart: unless-stopped

volumes:
  local_data:
